name: notilus
description: Notilus — Finder-style file manager with Ollama AI assistant and custom prompt-chain workflows.
publish_to: 'none'
version: 0.1.3

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  path: ^1.9.0
  path_provider: ^2.1.2
  video_player: ^2.9.1
  just_audio: ^0.9.40
  pdfx: ^2.6.0
  share_plus: ^10.0.2
  xterm: ^4.0.0
  flutter_pty: ^0.4.1
  flutter_svg: ^2.0.10
  flutter_markdown: ^0.7.4
  archive: ^3.6.1

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

# video_player_avfoundation 2.8.x+ split the Apple plugin into a modular
# Objective-C subtarget that imports <Flutter/Flutter.h> unconditionally,
# which breaks the macOS build (macOS provides FlutterMacOS, not Flutter).
# Pinning to the last pre-split version restores macOS support; iOS is
# unaffected.
dependency_overrides:
  video_player_avfoundation: 2.6.5

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256
